name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'portfolio/apps/backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'portfolio/apps/backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio/apps/backend/package.json

      - name: Install dependencies
        working-directory: portfolio/apps/backend
        run: npm ci

      - name: Lint
        working-directory: portfolio/apps/backend
        run: npm run lint --if-present

      - name: Build
        working-directory: portfolio/apps/backend
        run: npm run build

      - name: Test
        working-directory: portfolio/apps/backend
        run: npm test --if-present
