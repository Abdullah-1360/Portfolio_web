name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio/apps/frontend/package.json

      - name: Install dependencies
        working-directory: portfolio/apps/frontend
        run: npm ci

      - name: Build (static export)
        working-directory: portfolio/apps/frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://portfolio-backend-nu-seven.vercel.app/api
        run: npm run build

      - name: Add .nojekyll
        run: touch portfolio/apps/frontend/out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: portfolio/apps/frontend/out
